name: Build & Publish Releases

on:
    push:
        branches:
            - main

permissions:
    contents: write

jobs:
    check-and-tag:
        name: Check Versions & Auto-Tag
        runs-on: ubuntu-latest
        outputs:
            cli_changed: ${{ steps.check-cli.outputs.changed }}
            cli_tag: v${{ steps.check-cli.outputs.version }}
            gui_changed: ${{ steps.check-gui.outputs.changed }}
            gui_tag: v${{ steps.check-gui.outputs.version }}
            any_changed: ${{ steps.global-check.outputs.any_changed }}
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Configure Git Bot
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            - name: Check nnbfl (CLI) Version
              id: check-cli
              run: |
                  NEW_VER=$(grep -m 1 '^version = ' nnbfl/Cargo.toml | cut -d '"' -f 2)
                  OLD_VER=$(git show HEAD~1:nnbfl/Cargo.toml | grep -m 1 '^version = ' | cut -d '"' -f 2 || echo "0.0.0")
                  if [ "$NEW_VER" != "$OLD_VER" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "version=$NEW_VER" >> $GITHUB_OUTPUT
                    git tag "nnbfl-v$NEW_VER"
                    git push origin "nnbfl-v$NEW_VER"
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Check nnbfl-preview (GUI) Version
              id: check-gui
              run: |
                  NEW_VER=$(grep -m 1 '^version = ' nnbfl-preview/Cargo.toml | cut -d '"' -f 2)
                  OLD_VER=$(git show HEAD~1:nnbfl-preview/Cargo.toml | grep -m 1 '^version = ' | cut -d '"' -f 2 || echo "0.0.0")
                  if [ "$NEW_VER" != "$OLD_VER" ]; then
                    echo "changed=true" >> $GITHUB_OUTPUT
                    echo "version=$NEW_VER" >> $GITHUB_OUTPUT
                    git tag "nnbfl-preview-v$NEW_VER"
                    git push origin "nnbfl-preview-v$NEW_VER"
                  else
                    echo "changed=false" >> $GITHUB_OUTPUT
                  fi

            - name: Evaluate Global Changes
              id: global-check
              run: |
                  if [ "${{ steps.check-cli.outputs.changed }}" = "true" ] || [ "${{ steps.check-gui.outputs.changed }}" = "true" ]; then
                    echo "any_changed=true" >> $GITHUB_OUTPUT
                  else
                    echo "any_changed=false" >> $GITHUB_OUTPUT
                  fi

    build-release:
        name: Build Assets for ${{ matrix.job.target }}
        needs: check-and-tag
        if: "${{ needs.check-and-tag.outputs.any_changed == 'true' }}"
        runs-on: ${{ matrix.job.os }}
        strategy:
            fail-fast: false
            matrix:
                job:
                    - os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      bin-cli: nnbfl
                      bin-gui: nnbfl-preview
                    - os: windows-latest
                      target: x86_64-pc-windows-msvc
                      bin-cli: nnbfl.exe
                      bin-gui: nnbfl-preview.exe
                    - os: macos-latest
                      target: x86_64-apple-darwin
                      bin-cli: nnbfl
                      bin-gui: nnbfl-preview

        steps:
            - name: Checkout Source Code
              uses: actions/checkout@v4

            - name: Install Rust Toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.job.target }}

            - name: Cargo Cache
              uses: swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.job.target }}

            - name: Build Workspace (Optimized Release)
              run: cargo build --release --workspace --target ${{ matrix.job.target }}
-
            - name: Package CLI (Windows)
              if: matrix.job.os == 'windows-latest' && needs.check-and-tag.outputs.cli_changed == 'true'
              run: |
                  cd target/${{ matrix.job.target }}/release
                  7z a ../../../nnbfl-cli-${{ needs.check-and-tag.outputs.cli_tag }}-${{ matrix.job.target }}.zip ${{ matrix.job.bin-cli }}
              shell: pwsh

            - name: Package GUI (Windows)
              if: matrix.job.os == 'windows-latest' && needs.check-and-tag.outputs.gui_changed == 'true'
              run: |
                  cd target/${{ matrix.job.target }}/release
                  7z a ../../../nnbfl-gui-${{ needs.check-and-tag.outputs.gui_tag }}-${{ matrix.job.target }}.zip ${{ matrix.job.bin-gui }}
              shell: pwsh

            - name: Package CLI (Linux / macOS)
              if: matrix.job.os != 'windows-latest' && needs.check-and-tag.outputs.cli_changed == 'true'
              run: |
                  cd target/${{ matrix.job.target }}/release
                  tar -czf ../../../nnbfl-cli-${{ needs.check-and-tag.outputs.cli_tag }}-${{ matrix.job.target }}.tar.gz ${{ matrix.job.bin-cli }}

            - name: Package GUI (Linux / macOS)
              if: matrix.job.os != 'windows-latest' && needs.check-and-tag.outputs.gui_changed == 'true'
              run: |
                  cd target/${{ matrix.job.target }}/release
                  tar -czf ../../../nnbfl-gui-${{ needs.check-and-tag.outputs.gui_tag }}-${{ matrix.job.target }}.tar.gz ${{ matrix.job.bin-gui }}

            - name: Upload CLI to CLI Release
              if: needs.check-and-tag.outputs.cli_changed == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.check-and-tag.outputs.cli_tag }}
                  files: |
                      nnbfl-cli-*.zip
                      nnbfl-cli-*.tar.gz

            - name: Upload GUI to GUI Release
              if: needs.check-and-tag.outputs.gui_changed == 'true'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.check-and-tag.outputs.gui_tag }}
                  files: |
                      nnbfl-gui-*.zip
                      nnbfl-gui-*.tar.gz